name: Vercel Production Deployment

on:
  push:
    branches: [main]
    paths:
      - 'apps/headquarter-system/**'
      - 'apps/field-maintenance-system/**'
      - 'apps/landing-page/**'
      - 'packages/ui/**'
      - 'packages/types/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production - ${{ matrix.name }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        include:
          - name: Headquarter System
            app-directory: apps/headquarter-system
            project-id-var: VERCEL_PROJECT_ID_HQ
            generate-prisma: 'true'
          - name: Field Maintenance System
            app-directory: apps/field-maintenance-system
            project-id-var: VERCEL_PROJECT_ID_FSM
            generate-prisma: 'true'
          - name: Landing Page
            app-directory: apps/landing-page
            project-id-var: VERCEL_PROJECT_ID_LANDING
          - name: Storybook
            app-directory: packages/ui
            project-id-var: VERCEL_PROJECT_ID_STORYBOOK
            build-types: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/deploy-vercel-app
        with:
          app-directory: ${{ matrix.app-directory }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars[matrix.project-id-var] }}
          environment: production
          production: 'true'
          generate-prisma: ${{ matrix.generate-prisma || 'false' }}
          build-types: ${{ matrix.build-types || 'false' }}

      - name: Summary
        run: echo "### ${{ matrix.name }} deployed to production ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
